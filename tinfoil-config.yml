# Tinfoil Container Configuration for the serialized leakage lab.
cvm-version: 0.10.8
cpus: 8
memory: 8192

# No networks block: the lab has no outbound network.
containers:
  - name: "sequential-lab"
    image: "ghcr.io/zipitty/ishtar-oxide@sha256:60dc31ae82e9385b7dba1b1251ed722069b7c541b7eb70ba9232473d037adab8" # v0.4.0
    user: "65532:65532"
    secrets:
      - LAB_ADMIN_TOKEN
    read_only: true
    pids_limit: 256
    restart: on-failure
    stop_signal: SIGTERM
    stop_timeout: 10

shim:
  upstream-port: 8081
  upstream-container: "sequential-lab"
  paths:
    - /health
    - /v1/turn
